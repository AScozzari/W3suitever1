# ==============================================================================
# W3 Suite VPS Production Nginx Configuration
# ==============================================================================
#
# Install location: /etc/nginx/sites-available/w3suite
# Enable: sudo ln -s /etc/nginx/sites-available/w3suite /etc/nginx/sites-enabled/
# Test: sudo nginx -t
# Reload: sudo systemctl reload nginx
#
# Services:
# - W3 Suite Frontend: port 3000
# - Brand Interface Frontend: port 3001
# - W3 Suite API: port 3004
# - Brand Interface API: port 3002
# - Voice Gateway WebSocket: port 3005
# - Voice Gateway HTTP: port 3105
#
# ==============================================================================

# Upstream definitions for load balancing readiness
upstream w3_frontend {
    server 127.0.0.1:3000;
    keepalive 32;
}

upstream brand_frontend {
    server 127.0.0.1:3001;
    keepalive 32;
}

upstream w3_api {
    server 127.0.0.1:3004;
    keepalive 32;
}

upstream brand_api {
    server 127.0.0.1:3002;
    keepalive 32;
}

upstream voice_gateway_ws {
    server 127.0.0.1:3005;
    keepalive 32;
}

upstream voice_gateway_http {
    server 127.0.0.1:3105;
    keepalive 32;
}

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/s;

# HTTP to HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name _;
    
    # Allow health check on HTTP
    location /health {
        return 200 'nginx proxy healthy';
        add_header Content-Type text/plain;
    }
    
    # Redirect all other traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# Main HTTPS server block
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name _;
    
    # SSL Configuration (update paths as needed)
    ssl_certificate /etc/letsencrypt/live/your-domain/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    
    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
    
    # Client body size for file uploads
    client_max_body_size 50M;
    
    # Health check endpoint
    location /health {
        return 200 'nginx proxy healthy';
        add_header Content-Type text/plain;
    }
    
    # ==== W3 Suite API ====
    location /api/ {
        limit_req zone=api_limit burst=50 nodelay;
        
        proxy_pass http://w3_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
    
    # ==== Brand Interface API ====
    location /brand-api/ {
        limit_req zone=api_limit burst=50 nodelay;
        
        proxy_pass http://brand_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
    
    # ==== Voice Gateway WebSocket ====
    location /ws/ai-voice {
        proxy_pass http://voice_gateway_ws;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }
    
    # ==== Voice Gateway HTTP Streaming ====
    location /api/voice/ {
        proxy_pass http://voice_gateway_http;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_buffering off;
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }
    
    # ==== WebSocket for notifications ====
    location /ws/notifications {
        proxy_pass http://w3_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }
    
    # ==== Brand Interface Frontend ====
    location /brandinterface/ {
        proxy_pass http://brand_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }
    
    # ==== W3 Suite Frontend (default) ====
    location / {
        proxy_pass http://w3_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }
}
